name: flutter_application_1
description: Smishing Shield PH - DistilBERT-based smishing detection messaging app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.0
  image_picker: ^1.1.2
  file_picker: ^10.3.9
  flutter_webrtc: ^1.3.0
  flutter_callkeep: ^1.0.0
  flutter_local_notifications: ^17.0.0

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.1
  cloud_firestore: ^5.6.10
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.1.3
  firebase_app_check: ^0.3.1+3
  firebase_data_connect: ^0.1.1+2
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0
  open_filex: ^4.7.0
  path: ^1.9.1
  path_provider: ^2.1.5

  # State Management & Dependency Injection (For DDD)
  provider: ^6.1.2
  get_it: ^7.6.7
  equatable: ^2.0.5

  # Networking
  http: ^1.2.1
  url_launcher: ^6.3.0
  any_link_preview: ^3.0.1
  uuid: ^4.3.3
  sqflite_sqlcipher: ^3.4.0

  tflite_flutter: ^0.12.1

  # Dual-Channel & Background execution
  flutter_sms_inbox: ^1.0.4
  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.json
    - assets/distilbert_model.tflite
    - assets/tokenizer.json
    - assets/tokenizer_config.json
    - assets/vocab.txt
